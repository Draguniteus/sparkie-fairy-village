<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkie — Fairy Village</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #020a05; font-family: 'Georgia', serif; }
    canvas { display: block; }
    #hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: rgba(150,255,200,0.4); font-size: 12px; letter-spacing: 0.08em; pointer-events: none; opacity: 1; transition: opacity 2s ease; }
    #title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(120,230,180,0.4); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="title">🧚 FAIRY VILLAGE ✨</div>
<div id="hint">drag to orbit</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020a05);
scene.fog = new THREE.FogExp2(0x020a05, 0.015);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 10, 35);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.08;
controls.maxPolarAngle = Math.PI * 0.55;
controls.minDistance = 5;
controls.maxDistance = 65;

scene.add(new THREE.AmbientLight(0x102010, 0.4));

const fairyColors = [0xff88cc, 0x88ffcc, 0xffcc88, 0xcc88ff, 0x88ccff, 0xffaacc];

// Grass ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80, 80, 80),
  new THREE.ShaderMaterial({
    uniforms: {},
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      varying vec2 vUv;
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5); }
      void main() {
        float n = hash(floor(vUv * 50.0)) * 0.1;
        vec3 col = vec3(0.05, 0.15, 0.04) + n;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Giant mushroom houses
for (let m = 0; m < 12; m++) {
  const angle = (m / 12) * Math.PI * 2;
  const r = 5 + Math.random() * 15;
  const mx = Math.cos(angle) * r;
  const mz = Math.sin(angle) * r;
  const color = fairyColors[m % 6];
  
  // Stem
  const stem = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5 + Math.random() * 0.5, 0.8 + Math.random() * 0.5, 2 + Math.random() * 2, 12),
    new THREE.MeshStandardMaterial({ color: 0xd8c8b0, roughness: 0.8 })
  );
  stem.position.set(mx, stem.geometry.parameters.height / 2, mz);
  scene.add(stem);
  
  // Cap
  const cap = new THREE.Mesh(
    new THREE.SphereGeometry(1.5 + Math.random() * 1, 12, 12, 0, Math.PI * 2, 0, Math.PI / 2),
    new THREE.MeshStandardMaterial({ color, roughness: 0.6 })
  );
  cap.position.set(mx, stem.geometry.parameters.height, mz);
  cap.rotation.x = Math.PI;
  scene.add(cap);
  
  // Window glow
  const winGlow = new THREE.Mesh(
    new THREE.CircleGeometry(0.3, 12),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 2.0 })
  );
  winGlow.position.set(mx, 1.5 + Math.random(), mz + 0.5);
  scene.add(winGlow);
  
  const wLight = new THREE.PointLight(color, 1.5, 8);
  wLight.position.set(mx, 2, mz);
  scene.add(wLight);
}

// Tiny fairy houses (scattered mushroom cups)
for (let h = 0; h < 25; h++) {
  const hx = (Math.random() - 0.5) * 50;
  const hz = (Math.random() - 0.5) * 50;
  const color = fairyColors[Math.floor(Math.random() * 6)];
  
  // Cup shape house
  const cup = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1, 0.4, 0.6, 8),
    new THREE.MeshStandardMaterial({ color: 0x8a6040 })
  );
  cup.position.set(hx, 0.3, hz);
  scene.add(cup);
  
  const leafRoof = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 8, 8, 0, Math.PI * 2, 0, Math.PI / 2),
    new THREE.MeshStandardMaterial({ color, roughness: 0.7 })
  );
  leafRoof.position.set(hx, 0.55, hz);
  leafRoof.rotation.x = Math.PI;
  scene.add(leafRoof);
}

// Tiny doors
for (let d = 0; d < 15; d++) {
  const dx = (Math.random() - 0.5) * 40;
  const dz = (Math.random() - 0.5) * 40;
  const door = new THREE.Mesh(
    new THREE.CircleGeometry(0.15, 8),
    new THREE.MeshStandardMaterial({ color: 0x4a3020 })
  );
  door.position.set(dx, 0.5, dz);
  scene.add(door);
}

// Glowing flower paths
for (let p = 0; p < 100; p++) {
  const px = (Math.random() - 0.5) * 60;
  const pz = (Math.random() - 0.5) * 60;
  const color = fairyColors[Math.floor(Math.random() * 6)];
  
  const flower = new THREE.Mesh(
    new THREE.SphereGeometry(0.08 + Math.random() * 0.08, 8, 8),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 2.0 })
  );
  flower.position.set(px, 0.1, pz);
  scene.add(flower);
}

// Toadstool ring
for (let t = 0; t < 10; t++) {
  const angle = (t / 10) * Math.PI * 2;
  const r = 12;
  const tx = Math.cos(angle) * r;
  const tz = Math.sin(angle) * r;
  
  const toad = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.3, 0.4, 8),
    new THREE.MeshStandardMaterial({ color: 0xd8c8b0 })
  );
  toad.position.set(tx, 0.2, tz);
  scene.add(toad);
  
  const cap2 = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 8, 8, 0, Math.PI * 2, 0, Math.PI / 2),
    new THREE.MeshStandardMaterial({ color: 0xff4444 })
  );
  cap2.position.set(tx, 0.4, tz);
  cap2.rotation.x = Math.PI;
  scene.add(cap2);
}

// Tiny bridges over stream
const streamGeo = new THREE.PlaneGeometry(2, 30);
const streamMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    varying vec2 vUv;
    uniform float uTime;
    void main() {
      float ripple = sin(vUv.x * 20.0 + uTime) * sin(vUv.y * 5.0 + uTime * 0.7) * 0.05;
      vec3 col = mix(vec3(0.05, 0.2, 0.4), vec3(0.1, 0.4, 0.6), ripple + 0.5);
      gl_FragColor = vec4(col, 0.8);
    }
  `,
  transparent: true
});
const stream = new THREE.Mesh(streamGeo, streamMat);
stream.rotation.x = -Math.PI / 2;
stream.position.set(-20, 0.02, 0);
stream.userData.isStream = true;
scene.add(stream);

// Bridge
const bridge = new THREE.Mesh(
  new THREE.BoxGeometry(3, 0.2, 4),
  new THREE.MeshStandardMaterial({ color: 0x4a3020 })
);
bridge.position.set(-20, 0.3, 0);
scene.add(bridge);

// Bridge rails
for (let r = 0; r < 4; r++) {
  const rail = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05, 0.05, 1, 6),
    new THREE.MeshStandardMaterial({ color: 0x3a2010 })
  );
  rail.position.set(-21 + r * 1.5, 0.8, 0);
  scene.add(rail);
}

// Large magical tree at center
const treeTrunk = new THREE.Mesh(
  new THREE.CylinderGeometry(1.5, 2, 8, 12),
  new THREE.MeshStandardMaterial({ color: 0x3a2010 })
);
treeTrunk.position.set(0, 4, 0);
scene.add(treeTrunk);

// Tree canopy (multiple spheres for fluffy look)
const canopyColors = [0x2a6a15, 0x3a8a20, 0x1a5a10];
for (let c = 0; c < 8; c++) {
  const canopy = new THREE.Mesh(
    new THREE.SphereGeometry(3 + Math.random() * 2, 12, 12),
    new THREE.MeshStandardMaterial({ color: canopyColors[c % 3] })
  );
  canopy.position.set(
    (Math.random() - 0.5) * 4,
    8 + Math.random() * 3,
    (Math.random() - 0.5) * 4
  );
  scene.add(canopy);
}

// Tree lights (fairy lights)
for (let l = 0; l < 30; l++) {
  const color = fairyColors[Math.floor(Math.random() * 6)];
  const light = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 8, 8),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 3.0 })
  );
  light.position.set(
    (Math.random() - 0.5) * 6,
    6 + Math.random() * 6,
    (Math.random() - 0.5) * 6
  );
  scene.add(light);
  
  const lLight = new THREE.PointLight(color, 0.5, 3);
  lLight.position.copy(light.position);
  scene.add(lLight);
}

// Hanging vines from tree
for (let v = 0; v < 20; v++) {
  const vine = new THREE.Mesh(
    new THREE.CylinderGeometry(0.02, 0.04, 2 + Math.random() * 4, 6),
    new THREE.MeshStandardMaterial({ color: 0x1a4a10 })
  );
  vine.position.set(
    (Math.random() - 0.5) * 8,
    9 + Math.random() * 2,
    (Math.random() - 0.5) * 8
  );
  scene.add(vine);
}

// Fairy dust particles
const dustCount = 400;
const dustPos = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
  dustPos[i*3] = (Math.random() - 0.5) * 60;
  dustPos[i*3+1] = Math.random() * 20;
  dustPos[i*3+2] = (Math.random() - 0.5) * 60;
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    uniform float uTime;
    void main() {
      vec3 p = position;
      p.x += sin(uTime * 0.4 + position.y * 0.1) * 0.5;
      p.y += cos(uTime * 0.3 + position.x * 0.1) * 0.4;
      p.y = mod(p.y + uTime * 0.2, 20.0);
      gl_PointSize = 8.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = (1.0 - d * 2.0) * 0.8;
      vec3 col = mix(vec3(1.0, 0.9, 0.5), vec3(0.8, 0.5, 1.0), sin(uTime + position.x * 0.1) * 0.5 + 0.5);
      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const dust = new THREE.Points(dustGeo, dustMat);
dust.userData.isDust = true;
scene.add(dust);

// Butterflies
for (let b = 0; b < 20; b++) {
  const bGroup = new THREE.Group();
  const color = fairyColors[Math.floor(Math.random() * 6)];
  
  for (let w of [-1, 1]) {
    const wing = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 8, 8),
      new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 1.0, transparent: true, opacity: 0.7 })
    );
    wing.scale.set(1, 0.3, 0.5);
    wing.position.set(w * 0.3, 0, 0);
    bGroup.add(wing);
  }
  
  bGroup.position.set(
    (Math.random() - 0.5) * 50,
    3 + Math.random() * 10,
    (Math.random() - 0.5) * 50
  );
  bGroup.userData.bPhase = Math.random() * Math.PI * 2;
  bGroup.userData.isButterfly = true;
  scene.add(bGroup);
}

// Dewdrops on grass
for (let d = 0; d < 60; d++) {
  const dew = new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0xaaddff, transparent: true, opacity: 0.7, roughness: 0.1 })
  );
  dew.position.set(
    (Math.random() - 0.5) * 60,
    0.05,
    (Math.random() - 0.5) * 60
  );
  scene.add(dew);
}

// Firefly glow spheres
for (let f = 0; f < 15; f++) {
  const fColor = fairyColors[Math.floor(Math.random() * 6)];
  const firefly = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 8, 8),
    new THREE.MeshStandardMaterial({ color: fColor, emissive: fColor, emissiveIntensity: 4.0 })
  );
  firefly.position.set(
    (Math.random() - 0.5) * 50,
    1 + Math.random() * 8,
    (Math.random() - 0.5) * 50
  );
  firefly.userData.ffPhase = Math.random() * Math.PI * 2;
  firefly.userData.isFirefly = true;
  scene.add(firefly);
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  
  if (stream.userData.isStream && stream.material.uniforms.uTime) stream.material.uniforms.uTime.value = t;
  if (dust.userData.isDust) dust.material.uniforms.uTime.value = t;
  
  scene.children.forEach(child => {
    if (child.userData.isButterfly) {
      child.position.x += Math.sin(t * 0.4 + child.userData.bPhase) * 0.02;
      child.position.y += Math.cos(t * 0.3 + child.userData.bPhase) * 0.015;
      child.rotation.z = Math.sin(t * 2 + child.userData.bPhase) * 0.3;
    }
    if (child.userData.isFirefly) {
      child.position.x += Math.sin(t * 0.5 + child.userData.ffPhase) * 0.015;
      child.position.y += Math.cos(t * 0.4 + child.userData.ffPhase) * 0.01;
      child.material.emissiveIntensity = 3 + Math.sin(t * 3 + child.userData.ffPhase) * 1.5;
    }
  });
  
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
